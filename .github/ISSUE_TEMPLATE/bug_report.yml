name: Bug Report
description: Report a bug or unexpected behavior in StructFocus
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill in as much as you can — a reproducible bug is the fastest path to a fix.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code to reproduce the problem.
      placeholder: |
        1. Configure mcp.json with ...
        2. Run `...`
        3. Feed N messages about ...
        4. See error / wrong recall
      render: shell
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS / Node / pnpm versions, and which LLM backend (if relevant)
      placeholder: "Windows 11 / Node 22.6 / pnpm 9.1 / DeepSeek"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Paste any error output or `context_status` / `context_stats` results.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I ran `pnpm test` locally and it still reproduces
          required: false
