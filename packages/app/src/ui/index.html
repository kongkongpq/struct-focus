<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StructAgent · 上下文引擎控制台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-0: #0B1120; --bg-1: #111827;
      --primary: #38BDF8; --primary-2: #22D3EE; --primary-3: #6366F1;
      --text: #E5E7EB; --text-dim: #94A3B8;
      --ok: #34D399; --warn: #FBBF24; --bad: #F87171;
      --glass: rgba(30, 41, 59, 0.45);
      --glass-brd: rgba(56, 189, 248, 0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Poppins", system-ui, sans-serif;
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(99,102,241,0.18), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(34,211,238,0.14), transparent 55%),
        var(--bg-0);
      color: var(--text);
      overflow: hidden;
    }
    .app { display: flex; flex-direction: column; height: 100vh; }
    /* 顶栏 */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid var(--glass-brd);
      background: rgba(11,17,32,0.7); backdrop-filter: blur(12px);
      -webkit-app-region: drag;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: .3px; }
    .brand .dot { width: 10px; height: 10px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-3));
      box-shadow: 0 0 12px var(--primary); }
    .brand small { color: var(--text-dim); font-weight: 400; font-size: 12px; }
    .win-ctrl { display: flex; gap: 8px; -webkit-app-region: no-drag; }
    .win-ctrl button {
      width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--glass-brd);
      background: var(--glass); color: var(--text); cursor: pointer; transition: .15s;
    }
    .win-ctrl button:hover { background: rgba(56,189,248,0.18); box-shadow: 0 0 10px rgba(56,189,248,0.3); }
    /* 主体 */
    .body { flex: 1; display: flex; min-height: 0; }
    .nav { width: 200px; padding: 18px 12px; border-right: 1px solid var(--glass-brd);
      display: flex; flex-direction: column; gap: 8px; background: rgba(11,17,32,0.4); }
    .nav button {
      text-align: left; padding: 12px 14px; border-radius: 12px; border: 1px solid transparent;
      background: transparent; color: var(--text-dim); cursor: pointer; font-size: 14px; transition: .15s;
    }
    .nav button:hover { color: var(--text); background: var(--glass); }
    .nav button.active {
      color: #fff; border-color: var(--glass-brd);
      background: linear-gradient(135deg, rgba(56,189,248,0.18), rgba(99,102,241,0.18));
      box-shadow: 0 0 16px rgba(56,189,248,0.18);
    }
    .nav .spacer { flex: 1; }
    .main { flex: 1; padding: 22px; overflow-y: auto; }
    .screen { display: none; animation: fade .25s ease; }
    .screen.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    /* 玻璃卡 */
    .glass {
      background: var(--glass); border: 1px solid var(--glass-brd); border-radius: 16px;
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); padding: 18px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }
    .grid { display: grid; gap: 16px; }
    .cols-3 { grid-template-columns: repeat(3, 1fr); }
    .cols-4 { grid-template-columns: repeat(4, 1fr); }
    h2 { font-size: 15px; font-weight: 500; color: var(--text-dim); margin-bottom: 12px; letter-spacing: .4px; }
    /* 总览屏 */
    .overview { display: flex; gap: 18px; flex-wrap: wrap; }
    .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .ring { transform: rotate(-90deg); }
    .ring .bg { stroke: rgba(148,163,184,0.15); }
    .ring .fg { stroke: url(#grad); stroke-linecap: round; transition: stroke-dashoffset .6s ease; }
    .ring-center { position: relative; width: 0; height: 0; }
    .ring-label { position: absolute; transform: translate(-50%, -50%); text-align: center; left: 90px; top: 90px; }
    .ring-label .pct { font-size: 30px; font-weight: 600; }
    .ring-label .sub { font-size: 12px; color: var(--text-dim); }
    .metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; flex: 1; min-width: 280px; }
    .metric .k { color: var(--text-dim); font-size: 12px; }
    .metric .v { font-size: 22px; font-weight: 600; }
    .metric .v.ok { color: var(--ok); } .metric .v.warn { color: var(--warn); } .metric .v.bad { color: var(--bad); }
    /* 按钮 */
    .btn {
      padding: 9px 14px; border-radius: 10px; border: 1px solid var(--glass-brd);
      background: var(--glass); color: var(--text); cursor: pointer; font-size: 13px; transition: .15s; font-family: inherit;
    }
    .btn:hover { background: rgba(56,189,248,0.16); box-shadow: 0 0 12px rgba(56,189,248,0.3); }
    .btn.primary { background: linear-gradient(135deg, var(--primary), var(--primary-3)); color: #04121f; border: none; font-weight: 600; }
    .btn.primary:hover { box-shadow: 0 0 18px rgba(56,189,248,0.45); }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    input, textarea {
      background: rgba(2,6,23,0.6); border: 1px solid var(--glass-brd); border-radius: 10px;
      color: var(--text); padding: 9px 12px; font-family: inherit; font-size: 13px; outline: none;
    }
    input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(56,189,248,0.2); }
    .hint { color: var(--text-dim); font-size: 12px; }
    .log-line { font-size: 12px; color: var(--text-dim); margin-top: 10px; min-height: 16px; }
    /* 条目表 */
    .entry { display: flex; gap: 12px; align-items: flex-start; padding: 10px 12px; border-radius: 10px;
      border: 1px solid var(--glass-brd); background: rgba(17,24,39,0.4); margin-bottom: 8px; }
    .entry .role { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: rgba(56,189,248,0.16); color: var(--primary-2); white-space: nowrap; }
    .entry .meta { color: var(--text-dim); font-size: 11px; }
    .entry .content { flex: 1; font-size: 12px; color: var(--text); word-break: break-all; }
    .entry.cur { border-color: var(--ok); box-shadow: 0 0 10px rgba(52,211,153,0.25); }
    /* 日志时间线 */
    .timeline { position: relative; padding-left: 18px; }
    .timeline::before { content: ""; position: absolute; left: 5px; top: 0; bottom: 0; width: 2px; background: var(--glass-brd); }
    .tl-item { position: relative; padding: 8px 0; }
    .tl-item::before { content: ""; position: absolute; left: -16px; top: 12px; width: 9px; height: 9px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 8px var(--primary); }
    .tl-item .msg { font-size: 13px; }
    .tl-item .meta { font-size: 11px; color: var(--text-dim); }
    .tag { font-size: 11px; padding: 1px 7px; border-radius: 6px; }
    .tag.system { background: rgba(99,102,241,0.2); color: #c7d2fe; }
    .tag.agent { background: rgba(56,189,248,0.18); color: var(--primary-2); }
    .tag.user { background: rgba(52,211,153,0.18); color: var(--ok); }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; background:rgba(99,102,241,.18); color:#c7d2fe; font-size:11px; margin-left:6px; }
    .footer-status { margin-top: 12px; font-size: 12px; color: var(--text-dim); }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand"><span class="dot"></span> StructAgent <small>· 上下文引擎控制台</small></div>
      <div class="win-ctrl">
        <button id="btnMin" title="最小化">—</button>
        <button id="btnMax" title="最大化">▢</button>
        <button id="btnClose" title="关闭">✕</button>
      </div>
    </div>
    <div class="body">
      <div class="nav">
        <button data-screen="s1" class="active">总览 / 注意力审计</button>
        <button data-screen="s2">条目浏览与聚焦</button>
        <button data-screen="s3">驱逐与审计日志</button>
        <div class="spacer"></div>
        <button class="btn" id="btnReset">重置引擎</button>
      </div>
      <div class="main">
        <!-- 屏 1 -->
        <section class="screen active" id="s1">
          <div class="overview">
            <div class="glass ring-wrap">
              <svg class="ring" width="180" height="180" viewBox="0 0 180 180">
                <defs>
                  <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#38BDF8" /><stop offset="100%" stop-color="#6366F1" />
                  </linearGradient>
                </defs>
                <circle class="bg" cx="90" cy="90" r="74" fill="none" stroke-width="14" />
                <circle class="fg" id="ringFg" cx="90" cy="90" r="74" fill="none" stroke-width="14"
                  stroke-dasharray="464.96" stroke-dashoffset="464.96" />
              </svg>
              <div class="ring-label">
                <div class="pct" id="budgetPct">0%</div>
                <div class="sub" id="budgetTokens">0 / 0</div>
              </div>
            </div>
            <div class="glass metrics" style="flex:1; min-width:300px;">
              <h2>注意力浪费</h2>
              <div class="metric"><div class="k">未引用 token 占比</div><div class="v warn" id="wasteRatio">0%</div></div>
              <div class="metric"><div class="k">最大浪费来源</div><div class="v" id="wasteTop" style="font-size:15px;">—</div></div>
              <div class="metric"><div class="k">条目总数</div><div class="v" id="entryCount">0</div></div>
              <div class="metric"><div class="k">已聚焦文件</div><div class="v" id="focusCount">0</div></div>
            </div>
          </div>

          <div class="grid cols-4" style="margin-top:16px;">
            <div class="glass metric"><div class="k">已压缩</div><div class="v ok" id="mCompressed">0</div></div>
            <div class="glass metric"><div class="k">已驱逐</div><div class="v bad" id="mEvicted">0</div></div>
            <div class="glass metric"><div class="k">已截断</div><div class="v warn" id="mTruncated">0</div></div>
            <div class="glass metric"><div class="k">软限 (70%)</div><div class="v" id="mSoft">0</div></div>
          </div>

          <div class="glass" style="margin-top:16px;">
            <h2>驱动引擎</h2>
            <div class="row" style="margin-bottom:12px;">
              <button class="btn primary" id="btnTask">载入任务</button>
              <button class="btn primary" id="btnAuto">自动接管一轮</button>
              <button class="btn" id="btnReflect">立即 reflect</button>
            </div>
            <div class="row" style="margin-bottom:10px;">
              <input id="inFocus" placeholder="focus 文件路径，如 src/app.ts" style="flex:1;" />
              <select id="inScope" class="btn"><option value="symbols">symbols</option><option value="full">full</option><option value="summary">summary</option></select>
              <button class="btn" id="btnFocus">focus</button>
            </div>
            <div class="row" style="margin-bottom:10px;">
              <input id="inForget" placeholder="forget 文件路径" style="flex:1;" />
              <button class="btn" id="btnForget">forget</button>
            </div>
            <div class="row">
              <input id="inFiles" placeholder="任务文件(逗号分隔): src/a.ts,src/b.ts" style="flex:1;" />
              <input id="inFails" placeholder="失败测试(逗号分隔)" style="flex:1;" />
              <input id="inPhase" placeholder="阶段: execute" style="width:120px;" />
              <button class="btn" id="btnTaskCtx">注入任务上下文 (P1-3)</button>
            </div>
            <div class="log-line" id="statusLine">就绪。</div>
          </div>
        </section>

        <!-- 屏 2 -->
        <section class="screen" id="s2">
          <div class="row" style="margin-bottom:14px;">
            <button class="btn primary" id="btnRefreshEntries">刷新条目</button>
            <span class="hint" id="entryHint">D-Context 当前条目（按序列化顺序）</span>
          </div>
          <div id="entryList"></div>
        </section>

        <!-- 屏 3 -->
        <section class="screen" id="s3">
          <div class="row" style="margin-bottom:14px;">
            <button class="btn primary" id="btnRefreshLog">刷新日志</button>
            <span class="hint">上下文变更 / 自动接管 / 注意力审计时间线</span>
          </div>
          <div class="glass"><div class="timeline" id="logList"></div></div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const api = window.contextAPI;
    const $ = (id) => document.getElementById(id);
    let lastReport = null;

    // 导航
    document.querySelectorAll(".nav button[data-screen]").forEach((b) => {
      b.addEventListener("click", () => {
        document.querySelectorAll(".nav button[data-screen]").forEach((x) => x.classList.remove("active"));
        document.querySelectorAll(".screen").forEach((x) => x.classList.remove("active"));
        b.classList.add("active");
        $(b.dataset.screen).classList.add("active");
        if (b.dataset.screen === "s2") refreshEntries();
        if (b.dataset.screen === "s3") refreshLog();
      });
    });

    // 窗口控制
    $("btnMin").onclick = () => api.minimize();
    $("btnMax").onclick = () => api.maximize();
    $("btnClose").onclick = () => api.close();
    $("btnReset").onclick = async () => { await api.reset(); await refresh(); setStatus("引擎已重置。"); };

    const C = 2 * Math.PI * 74;
    function setRing(pct) {
      const off = C * (1 - Math.min(100, Math.max(0, pct)) / 100);
      $("ringFg").style.strokeDashoffset = off;
      $("budgetPct").textContent = Math.round(pct) + "%";
    }

    function setStatus(s) { $("statusLine").textContent = s; }

    async function refresh() {
      const r = await api.reflect();
      setRing(r.budgetPct);
      $("budgetTokens").textContent = `${r.total} / ${r.totalBudget ?? "?"}`;
      $("wasteRatio").textContent = Math.round((r.attentionWaste?.unusedRatio ?? 0) * 100) + "%";
      $("wasteTop").textContent = r.attentionWaste?.topWaster ?? "—";
      $("entryCount").textContent = r.entries;
      $("focusCount").textContent = (r.focusedFiles ?? []).length;
      $("mSoft").textContent = r.softLimit;
      if (lastReport) renderReport(lastReport);
      return r;
    }

    function renderReport(rep) {
      $("mCompressed").textContent = rep.compressed;
      $("mEvicted").textContent = rep.evicted;
      $("mTruncated").textContent = rep.truncated;
    }

    async function refreshEntries() {
      const entries = (await api.getEntries()) || [];
      const list = $("entryList");
      list.innerHTML = "";
      if (!entries.length) { list.innerHTML = '<div class="hint">暂无条目。可在「总览」载入任务或 focus 文件。</div>'; return; }
      entries.forEach((e) => {
        const div = document.createElement("div");
        div.className = "entry";
        div.innerHTML = `<span class="role">${e.role}</span>
          <div class="content">${escapeHtml(e.content)}</div>
          <div class="meta">~${e.tokens}t</div>`;
        list.appendChild(div);
      });
      $("entryHint").textContent = `D-Context 当前 ${entries.length} 条`;
    }

    async function refreshLog() {
      const logs = (await api.getLog()) || [];
      const list = $("logList");
      list.innerHTML = "";
      if (!logs.length) { list.innerHTML = '<div class="hint">暂无日志。</div>'; return; }
      logs.slice().reverse().forEach((l) => {
        const div = document.createElement("div");
        div.className = "tl-item";
        const t = new Date(l.timestamp).toLocaleTimeString();
        div.innerHTML = `<div class="msg">${escapeHtml(l.message)}</div>
          <div class="meta"><span class="tag ${l.author}">${l.author}</span> step ${l.step} · ${t}</div>`;
        list.appendChild(div);
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    }

    // 按钮
    $("btnTask").onclick = async () => {
      const task = prompt("输入任务描述（将作为 user 消息载入上下文）：");
      if (task === null) return;
      const r = await api.loadTask(task);
      setRing(r.budgetPct); $("entryCount").textContent = r.entries;
      setStatus("已载入任务。");
      await refresh();
    };
    $("btnReflect").onclick = async () => { await refresh(); setStatus("已 reflect。"); };
    $("btnAuto").onclick = async () => {
      const tc = readTaskContext();
      const res = await api.autoManage(tc);
      lastReport = res.report;
      renderReport(res.report);
      setRing(res.reflect.budgetPct);
      $("entryCount").textContent = res.reflect.entries;
      setStatus(`自动接管完成：压缩 ${res.report.compressed} / 驱逐 ${res.report.evicted} / 截断 ${res.report.truncated}`);
      await refreshLog();
    };
    $("btnFocus").onclick = async () => {
      const p = $("inFocus").value.trim(); if (!p) return;
      const r = await api.focus(p, $("inScope").value);
      setStatus("focus: " + (r?.output ?? "完成"));
      await refresh();
    };
    $("btnForget").onclick = async () => {
      const p = $("inForget").value.trim(); if (!p) return;
      const r = await api.forget(p);
      setStatus(`forget: 移除 ${r?.removed ?? 0} 条`);
      await refresh();
    };
    $("btnTaskCtx").onclick = async () => {
      const tc = readTaskContext();
      await api.setTaskContext(tc);
      setStatus(`已注入任务上下文（文件 ${tc.currentFiles.length} / 失败测试 ${tc.failedTests.length} / 阶段 ${tc.phase}）`);
    };
    function readTaskContext() {
      const files = $("inFiles").value.split(",").map((s) => s.trim()).filter(Boolean);
      const fails = $("inFails").value.split(",").map((s) => s.trim()).filter(Boolean);
      const phase = $("inPhase").value.trim() || "execute";
      return { currentFiles: files, currentSymbols: [], failedTests: fails, phase };
    }

    // 初始化
    (async () => {
      try { await api.init(); } catch (e) { setStatus("初始化失败：" + e); }
      await refresh();
    })();
  </script>
</body>
</html>
